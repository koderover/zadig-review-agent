name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include API keys, proprietary source code, or unredacted review reports. Report security issues privately as described in SECURITY.md.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `zadig-review-agent version`, or the commit SHA.
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Model protocol
      options:
        - Not applicable / preview
        - OpenAI
        - Gemini
        - Anthropic
        - Compatible third-party endpoint
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest safe example and exact command. Redact secrets and proprietary code.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste sanitized console output or a minimal report excerpt.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: I removed credentials and proprietary data from this report.
          required: true
        - label: This is not a security vulnerability.
          required: true
