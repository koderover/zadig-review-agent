name: Feature request
description: Propose an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: Thanks for proposing an improvement. Please describe the problem before the solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What use case is difficult or impossible today, and who is affected?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the user-visible behavior, including CLI or configuration changes.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternative designs have you considered?
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and security considerations
      description: Note migration, provider, read-only-boundary, privacy, or CI implications.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: I have not included credentials or proprietary data.
          required: true
